server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**,/api/v1/admin/**
        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/catalog/**
        - id: inventory-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/inventory/**
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

app:
  jwt:
    secret: atlas-platform-jwt-secret-at-least-32-bytes-long

logging:
  structured:
    format:
      console: logstash
