name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build shared library
        run: mvn -B -ntp -f common-lib/pom.xml clean install

      - name: Run unit and integration tests
        run: |
          for service in auth-service catalog-service inventory-service order-service notification-service api-gateway; do
            echo "Testing ${service}"
            mvn -B -ntp -f "${service}/pom.xml" clean verify
          done

      - name: Build production Docker images
        run: |
          for service in auth-service catalog-service inventory-service order-service notification-service api-gateway; do
            echo "Building image for ${service}"
            mvn -B -ntp -f "${service}/pom.xml" -DskipTests spring-boot:build-image \
              -Dspring-boot.build-image.imageName="ghcr.io/${{ github.repository_owner }}/atlas-${service}:${{ github.sha }}"
          done

      - name: Docker Compose smoke test
        run: |
          docker compose up -d
          docker compose ps
          docker compose down -v
